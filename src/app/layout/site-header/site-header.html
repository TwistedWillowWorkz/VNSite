<header class="site-header">
  <div class="brand">
    <img src="/images/tww-icon.png" alt="Twisted Willow Workz icon" class="brand-icon" />

    <div class="brand-text">
      <h1>Vellichor Nook</h1>
      <p>Treasure your reading journey</p>
    </div>
  </div>

  <nav class="main-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" >Home</a>
    <a routerLink="/announcements" routerLinkActive="active">Announcements</a>
    <a href="http://localhost:4300" class="nav-link"> Vellichor Nook </a>
    <a routerLink="/community" routerLinkActive="active">Community</a>
    <a routerLink="/pricing" routerLinkActive="active">Pricing</a>
  </nav>

  <div class="header-actions">
    <button class="btn btn-outline" type="button" (click)="openLogin()">Log In</button>
    <button class="btn btn-gold" type="button" (click)="openRegister()">Join Now</button>
  </div>

</header>
