<header class="site-header">
  <div class="brand">
    <img src="/images/tww-icon.png" alt="Twisted Willow Workz icon" class="brand-icon" />

    <div class="brand-text">
      <h1>Vellichor Nook</h1>
      <p>Treasure your reading journey</p>
    </div>
  </div>

  <nav class="main-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" >Home</a>
    <a routerLink="/announcements" routerLinkActive="active">Announcements</a>
    <a routerLink="/vellichor-nook" routerLinkActive="active" class="app-nav-link" >Vellichor Nook</a>
    <a routerLink="/community" routerLinkActive="active">Community</a>
    <a routerLink="/pricing" routerLinkActive="active">Pricing</a>
  </nav>

  <div class="header-actions">
    <a routerLink="/login" class="btn btn-outline">Log In</a>
    <a routerLink="/join" class="btn btn-gold">Join Now</a>
  </div>
</header>
